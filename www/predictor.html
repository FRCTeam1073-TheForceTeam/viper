<!DOCTYPE html>
<html>
<head>
<title data-i18n=predictor_title></title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<link rel=stylesheet href=/main.css>
<link rel=stylesheet href=/local.css>
<link rel=stylesheet href=/predictor.css>
<script src=/jquery.min.js></script>
<script src=/main.js></script>
<script src=/event-url.js></script>
<script src=/stats-config.js></script>
<script src=/predictor.js></script>
<script src=/local.js></script>
<link rel=icon type=image/png href=/logo.png>
</head>
<body>
<h1 data-i18n=predictor_title></h1>
<div class=teamDataEntry>
	<div id=allianceEntry>
		<div class="allianceRow redTeamBG">
			<span class=allianceLabel data-i18n=red_heading></span>
			<input type=text id=R1 size=5 placeholder="Team #" class=lastFocus>
			<input type=text id=R2 size=5 placeholder="Team #">
			<input type=text id=R3 size=5 placeholder="Team #" class=noftc>
		</div>
		<div class="allianceRow blueTeamBG">
			<span class=allianceLabel data-i18n=blue_heading></span>
			<input type=text id=B1 size=5 placeholder="Team #">
			<input type=text id=B2 size=5 placeholder="Team #">
			<input type=text id=B3 size=5 placeholder="Team #" class=noftc>
		</div>
	</div>
	<div class=orSep>- OR -</div>
	<div class=matchPick>Match: <select id=matchList></select></div>
	<div id=teamButtons></div>
</div>
<table id=prediction style=display:none><thead><tr>
	<th class=redTeamBG id=th-R1></th>
	<th class=redTeamBG id=th-R2></th>
	<th class="redTeamBG noftc" id=th-R3></th>
	<th class=redTeamBG><div data-i18n=red_heading></div></th>
	<th><button id=change-teams data-i18n=change_teams_button></button></th>
	<th class=blueTeamBG><div data-i18n=blue_heading></div></th>
	<th class=blueTeamBG id=th-B1></th>
	<th class=blueTeamBG id=th-B2></th>
	<th class="blueTeamBG noftc" id=th-B3></th>
</tr></thead><tbody>
</tbody></table></body></html>
