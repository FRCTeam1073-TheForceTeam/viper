<!DOCTYPE html>
<html>
<head>
<title data-i18n=local_config_title></title>
<meta name=viewport content="width=device-width,initial-scale=1.0">
<meta charset=UTF-8>
<link rel=stylesheet href=/main.css>
<link rel=stylesheet href=/local.css>
<link rel=stylesheet href=/local-config.css>
<script src=/jquery.min.js></script>
<script src=/main.js></script>
<script src=/local.js></script>
<script src=/local-config.js></script>
<link rel=icon type=image/png href=/logo.png>
</head>
<body>
<div id=main>
<h1 data-i18n=local_config_title></h1>

<div id=loading data-i18n=local_config_loading></div>

<form id=local-config-form style=display:none method=POST action=/admin/local-config.cgi>
	<div class=form-group>
		<label for=form-ourTeam data-i18n=local_config_team_number></label>
		<input id=form-ourTeam type=number min=0 max=99999 name=ourTeam>
	</div>

	<div class=form-group>
		<label for=form-showScoutingComments>
			<input id=form-showScoutingComments type=checkbox name=showScoutingComments>
			<span data-i18n=local_config_scouting_comments></span>
		</label>
	</div>

	<div class=form-group>
		<label for=form-showReviewRequest>
			<input id=form-showReviewRequest type=checkbox name=showReviewRequest>
			<span data-i18n=local_config_review_requests></span>
		</label>
	</div>

	<div class=form-group>
		<label for=form-transferHosts data-i18n=local_config_transfer_hosts></label>
		<textarea id=form-transferHosts rows=4 placeholder="localhost&#10;example.com&#10;192.168.1.1:8080"></textarea>
		<small data-i18n=local_config_transfer_hosts_help></small>
	</div>

	<div id=message-area></div>

	<input type=hidden id=transferHosts-json name=transferHosts>
	<button type=submit data-i18n=local_config_save></button>
</form>
</div>
</body>
</html>
